name: schoolapp
description: Assignment Manager

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6

  #UI
  fl_chart: ^0.66.2
  table_calendar: ^3.1.2

  #storage
  shared_preferences: ^2.5.3
  file_picker: ^10.3.3

  #Notification
  flutter_local_notifications: ^19.5.0

  #Utils
  image_picker: ^1.2.0
  path_provider: ^2.1.5
  share_plus: ^7.2.2

  #state management
  provider: ^6.1.2

  #connectivity
  connectivity_plus: ^6.1.3

  #Splash screen
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
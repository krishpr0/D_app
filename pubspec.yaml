name: schoolapp
description: Assignment Manager

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  #UI
  fl_chart: ^1.2.0
  table_calendar: ^3.1.2

  #storage
  shared_preferences: ^2.5.3
  file_picker: ^10.3.3

  #Notification
  flutter_local_notifications: ^21.0.0

  #Utils
  image_picker: ^1.2.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1

  #state management
  provider: ^6.1.2

  #connectivity
  connectivity_plus: ^7.0.0

  #Splash screen
  flutter_native_splash: ^2.4.1

  #OCR and ML
  google_ml_kit: ^0.16.0
  pdf: ^3.10.0

  #document handling
  cross_file: ^0.3.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true